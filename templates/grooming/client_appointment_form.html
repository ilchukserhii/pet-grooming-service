{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow-sm">
          <div class="card-body">

            <h3 class="text-center mb-4">{{ object|yesno:"Оновити,Створити" }} запис</h3>

            <form method="post">
              {% csrf_token %}

              {{ form|crispy }}

              <div class="d-grid mt-3">
                <input type="submit" class="btn btn-primary">
                <br>
                <a href="{% url "grooming:cabinet" %}" class="btn btn-secondary">
                  Повернутись
                </a>
              </div>
            </form>

          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
