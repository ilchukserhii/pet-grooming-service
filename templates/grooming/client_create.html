{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm">
          <div class="card-body">

            <h3 class="text-center mb-4">Створити профіль</h3>

            <form method="post">
              {% csrf_token %}

              {{ form|crispy }}

              <button type="submit" class="btn btn-primary w-100 mt-3">
                Створити профіль
              </button>
              <a href="{% url 'grooming:index' %}" class="btn btn-outline-secondary w-100 mt-2">
                Скасувати
              </a>
            </form>

          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
